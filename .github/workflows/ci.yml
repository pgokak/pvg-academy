# Name shown in GitHub Actions tab in your repository
name: CI

# WHEN to run this workflow
on:
  push:
    branches: [main] # run when code is pushed directly to main
  pull_request:
    branches: [main] # run when a pull request is opened targeting main

# WHAT to run
jobs:
  check: # job name — you can have multiple jobs running in parallel
    runs-on: ubuntu-latest # spin up a fresh Ubuntu machine on GitHub's servers

    steps:
      # Step 1: Download your code onto the GitHub runner machine
      # Without this, the machine has no code to work with
      - uses: actions/checkout@v4

      # Step 2: Install Node.js on the runner machine
      # cache: npm reuses node_modules between runs so it's faster
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Step 3: Install dependencies
      # npm ci is stricter than npm install — uses exact versions from
      # package-lock.json, never silently upgrades anything
      - run: npm ci

      # Step 4: Check TypeScript types
      # Fails if any type errors exist — catches bugs before runtime
      - name: Typecheck
        run: npm run typecheck

      # Step 5: Run ESLint
      # Fails if any lint rules are violated
      - name: Lint
        run: npm run lint

      # Step 6: Run Vitest unit tests
      # --run means "run once and exit" not watch mode
      # Fails if any test fails
      - name: Unit tests
        run: npm run test -- --run
